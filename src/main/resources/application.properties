spring.application.name=project-booking.com-clone

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/booking_db}
spring.datasource.username=${DB_USERNAME:booking_user}
spring.datasource.password=${DB_PASSWORD:booking_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
debug=true
spring.elasticsearch.uris=http://localhost:9200